<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>靖員 · 快速叫號</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&family=Noto+Sans+TC:wght@300;400;500&display=swap');

:root {
  --green: #0f2318;
  --green-mid: #1e5c38;
  --green-light: #3a8a58;
  --green-pale: #d4e8db;
  --blue: #1a2c3f;
  --blue-mid: #2c5f8a;
  --blue-pale: #d4e4f0;
  --gold: #b8952a;
  --red: #c0392b;
  --red-pale: #fbe9e7;
  --border: #bcd3c5;
  --bg: #f0f5f1;
  --white: #ffffff;
  --stone: #4a6855;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  -webkit-tap-highlight-color: transparent;
}

body {
  font-family: 'Noto Sans TC', sans-serif;
  background: var(--bg);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* HEADER */
.header {
  background: linear-gradient(160deg, var(--green) 0%, var(--green-mid) 100%);
  color: white;
  padding: 16px 20px 14px;
  text-align: center;
}

.header-title {
  font-family: 'Noto Serif TC', serif;
  font-size: 16px;
  letter-spacing: 4px;
  font-weight: 700;
}

.header-sub {
  font-size: 10px;
  letter-spacing: 2px;
  opacity: .7;
  margin-top: 2px;
}

/* SYNC BAR */
.sync-bar {
  background: var(--green-mid);
  color: white;
  text-align: center;
  padding: 5px;
  font-size: 11px;
  letter-spacing: 2px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}

.sync-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #7dffb3;
  animation: pd 2s ease-in-out infinite;
}

.sync-bar.offline {
  background: #888;
}

.sync-bar.offline .sync-dot {
  background: #ccc;
  animation: none;
}

@keyframes pd {
  0%,100% { opacity:1; }
  50% { opacity:.3; }
}

/* MAIN */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 12px;
  padding: 14px 12px;
}

/* CARD */
.clinic-card {
  background: var(--white);
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 4px 20px rgba(15,35,24,.12);
  border: 1px solid var(--border);
  flex: 1;
}

.clinic-card-header {
  padding: 14px 16px 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.clinic-card-header.c1 {
  background: linear-gradient(135deg, var(--green), var(--green-mid));
}

.clinic-card-header.c2 {
  background: linear-gradient(135deg, var(--blue), var(--blue-mid));
}

.clinic-label {
  font-family: 'Noto Serif TC', serif;
  font-size: 18px;
  font-weight: 700;
  letter-spacing: 3px;
  color: white;
}

.clinic-doctor {
  font-size: 12px;
  color: rgba(255,255,255,.8);
  letter-spacing: 1px;
  margin-top: 2px;
}

.clinic-status-badge {
  padding: 4px 12px;
  border-radius: 12px;
  font-size: 11px;
  letter-spacing: 1px;
  font-weight: 500;
}

.clinic-status-badge.open {
  background: rgba(255,255,255,.25);
  color: white;
}

.clinic-status-badge.paused {
  background: rgba(255,100,80,.3);
  color: #ffd0ca;
}

.clinic-status-badge.closed {
  background: rgba(0,0,0,.2);
  color: rgba(255,255,255,.6);
}

.clinic-body {
  padding: 16px;
}

/* NUMBER */
.number-display {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 20px;
  margin-bottom: 16px;
}

.num-block {
  text-align: center;
}

.num-lbl {
  font-size: 10px;
  letter-spacing: 2px;
  color: var(--stone);
  margin-bottom: 4px;
}

.num-val {
  font-family: 'Noto Serif TC', serif;
  font-size: 56px;
  font-weight: 900;
  line-height: 1;
  transition: all .3s cubic-bezier(.34,1.56,.64,1);
}

.num-val.c1 {
  color: var(--green-mid);
}

.num-val.c2 {
  color: var(--blue-mid);
}

.num-val.next-num {
  font-size: 36px;
  color: #aaa;
}

.num-arrow {
  font-size: 24px;
  color: #ccc;
  padding-bottom: 8px;
}

.num-val.bump {
  transform: scale(1.2);
}

/* BUTTON */
.call-btn {
  width: 100%;
  padding: 18px;
  border-radius: 16px;
  border: none;
  font-family: 'Noto Serif TC', serif;
  font-size: 20px;
  font-weight: 700;
  letter-spacing: 4px;
  cursor: pointer;
  transition: all .15s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  position: relative;
  overflow: hidden;
}

.call-btn.c1 {
  background: linear-gradient(135deg, var(--green-mid), var(--green-light));
  color: white;
  box-shadow: 0 6px 20px rgba(30,92,56,.4);
}

.call-btn.c2 {
  background: linear-gradient(135deg, var(--blue-mid), #4a88bb);
  color: white;
  box-shadow: 0 6px 20px rgba(44,95,138,.4);
}

.call-btn:active {
  transform: scale(.96);
  box-shadow: none;
}

.call-btn:disabled {
  opacity: .5;
  cursor: not-allowed;
  transform: none;
}

.call-icon {
  font-size: 22px;
}

/* RIPPLE */
.ripple {
  position: absolute;
  border-radius: 50%;
  background: rgba(255,255,255,.4);
  transform: scale(0);
  animation: ripple-anim .5s linear;
  pointer-events: none;
}

@keyframes ripple-anim {
  to {
    transform: scale(4);
    opacity: 0;
  }
}

/* SUB */
.sub-controls {
  display: flex;
  gap: 8px;
  margin-top: 10px;
}

.sub-btn {
  flex: 1;
  padding: 10px 8px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--bg);
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 12px;
  letter-spacing: 1px;
  color: var(--stone);
  cursor: pointer;
  transition: all .15s;
  text-align: center;
}

.sub-btn:active {
  background: var(--green-pale);
}

.sub-btn.c2:active {
  background: var(--blue-pale);
}

.sub-btn.danger {
  color: var(--red);
  border-color: #e8a09b;
}

.sub-btn.danger:active {
  background: var(--red-pale);
}

/* NOTICE */
.status-notice {
  margin-top: 10px;
  padding: 10px 14px;
  border-radius: 10px;
  font-size: 13px;
  text-align: center;
  letter-spacing: 1px;
  display: none;
}

.status-notice.paused {
  background: var(--red-pale);
  color: var(--red);
  border: 1px solid #e8a09b;
  display: block;
}

.status-notice.closed {
  background: #f0f0f0;
  color: #888;
  border: 1px solid #ddd;
  display: block;
}

/* OVERLAY */
#conn-overlay,
#pw-overlay {
  position: fixed;
  inset: 0;
  background: var(--green);
  z-index: 999;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

#pw-overlay {
  z-index: 998;
  gap: 18px;
  padding: 32px;
}

.hidden {
  display: none !important;
}

.conn-title,
.pw-logo {
  font-family: 'Noto Serif TC', serif;
  font-size: 20px;
  letter-spacing: 5px;
  color: white;
}

.conn-sub {
  font-size: 11px;
  letter-spacing: 2px;
  opacity: .6;
  color: white;
}

.conn-spinner {
  width: 32px;
  height: 32px;
  border: 3px solid rgba(255,255,255,.2);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: spin .9s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.pw-icon {
  font-size: 36px;
}

.pw-title {
  font-size: 15px;
  letter-spacing: 3px;
  color: white;
}

.pw-input {
  width: 100%;
  max-width: 260px;
  height: 52px;
  border-radius: 12px;
  border: 2px solid rgba(255,255,255,.2);
  background: rgba(255,255,255,.1);
  text-align: center;
  font-size: 28px;
  letter-spacing: 8px;
  color: white;
  outline: none;
}

.pw-input:focus {
  border-color: var(--gold);
}

.pw-input.error {
  border-color: var(--red);
  animation: shake .3s;
}

@keyframes shake {
  0%,100% { transform:translateX(0); }
  25% { transform:translateX(-8px); }
  75% { transform:translateX(8px); }
}

.pw-btn {
  width: 100%;
  max-width: 260px;
  padding: 14px;
  border-radius: 12px;
  border: none;
  background: var(--green-mid);
  color: white;
  font-family: 'Noto Serif TC', serif;
  font-size: 15px;
  letter-spacing: 3px;
  cursor: pointer;
}

.pw-hint {
  font-size: 11px;
  color: rgba(255,255,255,.5);
  letter-spacing: 1px;
}

/* TOAST */
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: #1a1a1a;
  color: white;
  padding: 10px 24px;
  border-radius: 20px;
  font-size: 13px;
  letter-spacing: 2px;
  opacity: 0;
  transition: all .3s;
  z-index: 300;
  white-space: nowrap;
}

.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* MANUAL */
.manual-row {
  margin-top: 10px;
  padding: 12px 14px;
  background: #f7faf8;
  border-radius: 12px;
  border: 1px solid var(--border);
}

.manual-label {
  font-size: 10px;
  letter-spacing: 2px;
  color: var(--stone);
  margin-bottom: 8px;
}

.manual-control {
  display: flex;
  gap: 8px;
}

.manual-input {
  flex: 1;
  height: 42px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: white;
  text-align: center;
  font-family: 'Noto Serif TC', serif;
  font-size: 22px;
  font-weight: 700;
  color: var(--green);
  outline: none;
}

.manual-btn {
  padding: 0 16px;
  height: 42px;
  border-radius: 10px;
  border: none;
  font-family: 'Noto Serif TC', serif;
  font-size: 13px;
  letter-spacing: 2px;
  cursor: pointer;
  white-space: nowrap;
  color: white;
}

.manual-btn.c1 {
  background: var(--green-mid);
}

.manual-btn.c2 {
  background: var(--blue-mid);
}

.footer {
  text-align: center;
  padding: 10px;
  font-size: 10px;
  color: #aaa;
  letter-spacing: 1px;
}
</style>
</head>

<body>

<div id="conn-overlay">
  <div class="conn-title">靖員中醫診所</div>
  <div class="conn-sub">正在連線…</div>
  <div class="conn-spinner"></div>
</div>

<div id="pw-overlay">
  <div class="pw-logo">靖員中醫診所</div>
  <div class="pw-icon">🔒</div>
  <div class="pw-title">請輸入管理密碼</div>

  <input class="pw-input"
         type="password"
         id="pw-input"
         maxlength="6"
         placeholder="••••••"
         oninput="pwInput()"
         onkeydown="if(event.key==='Enter')checkPw()">

  <button class="pw-btn" onclick="checkPw()">進 入</button>

  <div class="pw-hint">僅限診所工作人員使用</div>
</div>

<div class="header">
  <div class="header-title">快 速 叫 號</div>
  <div class="header-sub">靖員中醫診所 · JING YUAN TCM CLINIC</div>
</div>

<div class="sync-bar" id="sync-bar">
  <span class="sync-dot"></span>
  <span id="sync-txt">即時同步中</span>
</div>

<div class="main">

  <!-- 1診 -->
  <div class="clinic-card">

    <div class="clinic-card-header c1">
      <div>
        <div class="clinic-label">1 診</div>
        <div class="clinic-doctor" id="doc1">—</div>
      </div>

      <div class="clinic-status-badge open" id="badge1">看診中</div>
    </div>

    <div class="clinic-body">

      <div class="number-display">
        <div class="num-block">
          <div class="num-lbl">現在號碼</div>
          <div class="num-val c1" id="cur1">—</div>
        </div>

        <div class="num-arrow">→</div>

        <div class="num-block">
          <div class="num-lbl">叫號後</div>
          <div class="num-val next-num" id="nxt1">—</div>
        </div>
      </div>

      <div class="status-notice" id="notice1"></div>

      <button class="call-btn c1" id="callbtn1" onclick="callNext(1, event)">
        <span class="call-icon">📢</span>
        叫 下 一 號
      </button>

      <div class="sub-controls">
        <button class="sub-btn" onclick="undoCall(1)">↩ 上一號</button>
        <button class="sub-btn danger" onclick="togglePause(1)">⏸ 暫停 / 恢復</button>
      </div>

      <div class="manual-row">
        <div class="manual-label">手動輸入號碼</div>

        <div class="manual-control">
          <input type="number"
                 class="manual-input"
                 id="manual1"
                 placeholder="輸入號碼"
                 min="0"
                 max="999">

          <button class="manual-btn c1" onclick="manualSet(1)">
            確認跳號
          </button>
        </div>
      </div>

    </div>
  </div>

  <!-- 2診 -->
  <div class="clinic-card">

    <div class="clinic-card-header c2">
      <div>
        <div class="clinic-label">2 診</div>
        <div class="clinic-doctor" id="doc2">—</div>
      </div>

      <div class="clinic-status-badge open" id="badge2">看診中</div>
    </div>

    <div class="clinic-body">

      <div class="number-display">
        <div class="num-block">
          <div class="num-lbl">現在號碼</div>
          <div class="num-val c2" id="cur2">—</div>
        </div>

        <div class="num-arrow">→</div>

        <div class="num-block">
          <div class="num-lbl">叫號後</div>
          <div class="num-val next-num" id="nxt2">—</div>
        </div>
      </div>

      <div class="status-notice" id="notice2"></div>

      <button class="call-btn c2" id="callbtn2" onclick="callNext(2, event)">
        <span class="call-icon">📢</span>
        叫 下 一 號
      </button>

      <div class="sub-controls">
        <button class="sub-btn c2" onclick="undoCall(2)">↩ 上一號</button>
        <button class="sub-btn danger" onclick="togglePause(2)">⏸ 暫停 / 恢復</button>
      </div>

      <div class="manual-row">
        <div class="manual-label">手動輸入號碼</div>

        <div class="manual-control">
          <input type="number"
                 class="manual-input"
                 id="manual2"
                 placeholder="輸入號碼"
                 min="0"
                 max="999">

          <button class="manual-btn c2" onclick="manualSet(2)">
            確認跳號
          </button>
        </div>
      </div>

    </div>
  </div>

</div>

<div class="footer">
  按下「叫下一號」後自動同步到患者端
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import {
  getDatabase,
  ref,
  onValue,
  update
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDXwciAKP2Ry5eS_yD2wHdwBunU2Tkd6_k",
  authDomain: "jy-opd.firebaseapp.com",
  databaseURL: "https://jy-opd-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "jy-opd",
  storageBucket: "jy-opd.firebasestorage.app",
  messagingSenderId: "158075738592",
  appId: "1:158075738592:web:f9ae165bcb1b265811f385"
};

const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);

let data = {
  clinic1: {},
  clinic2: {}
};

const PASS = '6817';

/* 密碼 */
window.pwInput = () => {
  document.getElementById('pw-input')
          .classList.remove('error');
};

window.checkPw = () => {

  if (document.getElementById('pw-input').value === PASS) {
    document.getElementById('pw-overlay')
            .classList.add('hidden');
  } else {

    const el = document.getElementById('pw-input');

    el.classList.add('error');
    el.value = '';

    setTimeout(() => {
      el.classList.remove('error');
    }, 400);
  }
};

/* Firebase */
onValue(ref(db, 'queue'), snap => {

  document.getElementById('conn-overlay')
          .classList.add('hidden');

  setSyncBar(true);

  const val = snap.val();

  if (!val) return;

  data = val;

  render();
});

function setSyncBar(online) {

  const bar = document.getElementById('sync-bar');
  const txt = document.getElementById('sync-txt');

  bar.className = online
    ? 'sync-bar'
    : 'sync-bar offline';

  txt.textContent = online
    ? '即時同步中'
    : '離線';
}

const fmt = n => String(n).padStart(3, '0');

/* Render */
function render() {

  [1, 2].forEach(n => {

    const cl = data['clinic' + n] || {};

    const cur = cl.cur ?? 0;
    const nxt = cl.nxt ?? 0;

    const curEl = document.getElementById('cur' + n);

    const oldV = curEl.textContent;
    const newV = fmt(cur);

    curEl.textContent = newV;

    document.getElementById('nxt' + n)
            .textContent = fmt(nxt);

    if (oldV !== newV && oldV !== '—') {

      curEl.classList.add('bump');

      setTimeout(() => {
        curEl.classList.remove('bump');
      }, 400);
    }

    document.getElementById('doc' + n)
            .textContent = cl.doctor || '—';

    const badge  = document.getElementById('badge' + n);
    const notice = document.getElementById('notice' + n);
    const btn    = document.getElementById('callbtn' + n);

    notice.className = 'status-notice';
    notice.textContent = '';

    if (cl.closed) {

      badge.className = 'clinic-status-badge closed';
      badge.textContent = '未開診';

      notice.className = 'status-notice closed';
      notice.textContent = '此診間今日未開診';

      btn.disabled = true;

    } else if (cl.paused) {

      badge.className = 'clinic-status-badge paused';
      badge.textContent = '暫停中';

      notice.className = 'status-notice paused';
      notice.textContent = '⏸ 看診暫停中';

      btn.disabled = false;

    } else {

      badge.className = 'clinic-status-badge open';
      badge.textContent = '看診中';

      btn.disabled = false;
    }
  });
}

/* 手動跳號 */
window.manualSet = async function(n) {

  const input = document.getElementById('manual' + n);

  const val = parseInt(input.value);

  if (isNaN(val) || val < 0 || val > 999) {
    showToast('請輸入有效號碼 (0-999)');
    return;
  }

  const newCur = val;
  const newNxt = val + 1;

  try {

    await update(ref(db, 'queue/clinic' + n), {
      cur: newCur,
      nxt: newNxt,
      updatedAt: new Date().toISOString()
    });

    showToast(n + '診跳號 → ' + fmt(newCur) + ' 號 ✓');

    input.value = '';

  } catch(err) {

    showToast('更新失敗，請確認網路');
  }
};

/* 下一號 */
window.callNext = async function(n, e) {

  const btn = e.currentTarget;

  const ripple = document.createElement('span');

  const rect = btn.getBoundingClientRect();

  const size = Math.max(rect.width, rect.height);

  ripple.className = 'ripple';

  ripple.style.cssText = `
    width:${size}px;
    height:${size}px;
    left:${e.clientX - rect.left - size/2}px;
    top:${e.clientY - rect.top - size/2}px
  `;

  btn.appendChild(ripple);

  setTimeout(() => ripple.remove(), 600);

  const cl = data['clinic' + n] || {};

  const newCur = (cl.cur ?? 0) + 1;
  const newNxt = newCur + 1;

  btn.disabled = true;

  try {

    await update(ref(db, 'queue/clinic' + n), {
      cur: newCur,
      nxt: newNxt,
      updatedAt: new Date().toISOString()
    });

    showToast(n + '診 → ' + fmt(newCur) + ' 號 ✓');

  } catch(err) {

    showToast('更新失敗，請確認網路');
  }

  setTimeout(() => {
    btn.disabled = false;
  }, 800);
};

/* 上一號 */
window.undoCall = async function(n) {

  const cl = data['clinic' + n] || {};

  const newCur = Math.max((cl.cur ?? 1) - 1, 0);

  const newNxt = newCur + 1;

  try {

    await update(ref(db, 'queue/clinic' + n), {
      cur: newCur,
      nxt: newNxt,
      updatedAt: new Date().toISOString()
    });

    showToast(n + '診退回 → ' + fmt(newCur) + ' 號');

  } catch(err) {

    showToast('操作失敗');
  }
};

/* 暫停 */
window.togglePause = async function(n) {

  const cl = data['clinic' + n] || {};

  const newPaused = !cl.paused;

  try {

    await update(ref(db, 'queue/clinic' + n), {
      paused: newPaused,
      updatedAt: new Date().toISOString()
    });

    showToast(
      n + '診 ' + (newPaused ? '已暫停' : '已恢復')
    );

  } catch(err) {

    showToast('操作失敗');
  }
};

/* Toast */
function showToast(msg) {

  const t = document.getElementById('toast');

  t.textContent = msg;

  t.classList.add('show');

  clearTimeout(window._tt);

  window._tt = setTimeout(() => {
    t.classList.remove('show');
  }, 2000);
}
</script>
