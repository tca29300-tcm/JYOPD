<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>靖員中醫診所 · 看診進度</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500;700&family=Noto+Sans+TC:wght@300;400;500&display=swap');

  :root {
    --ink: #0f2318;
    --parchment: #f0f5f1;
    --warm-white: #f7faf8;
    --sage: #1e5c38;
    --sage-light: #3a8a58;
    --sage-pale: #d4e8db;
    --gold: #8a6f2e;
    --gold-light: #b8952a;
    --red: #b03a2e;
    --red-pale: #fbe9e7;
    --stone: #4a6855;
    --stone-light: #8aaa96;
    --border: #bcd3c5;
    --shadow: rgba(15,35,24,0.10);
    --c2: #2c5f8a;
    --c2-pale: #d4e4f0;
    --c2-light: #4a88bb;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--parchment);
    color: var(--ink);
    min-height: 100vh;
    font-size: 15px;
    line-height: 1.6;
  }

  /* ── CONNECTING OVERLAY ── */
  #conn-overlay {
    position: fixed; inset: 0;
    background: #0f2318;
    z-index: 999;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 16px;
    color: white;
  }
  #conn-overlay.hidden { display: none; }
  .conn-logo { font-family: 'Noto Serif TC', serif; font-size: 22px; letter-spacing: 6px; color: #d4e8db; }
  .conn-sub  { font-size: 12px; letter-spacing: 3px; color: var(--stone-light); }
  .conn-spinner {
    width: 36px; height: 36px;
    border: 3px solid rgba(255,255,255,.2);
    border-top-color: #b8952a;
    border-radius: 50%;
    animation: spin .9s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .conn-msg { font-size: 13px; color: var(--stone-light); letter-spacing: 1px; }

  /* ── PASSWORD LOCK ── */
  #pw-overlay {
    position: fixed; inset: 0;
    background: #0f2318;
    z-index: 500;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 20px; padding: 32px;
  }
  #pw-overlay.hidden { display: none; }
  .pw-logo { font-family: 'Noto Serif TC', serif; font-size: 22px; letter-spacing: 6px; color: #d4e8db; }
  .pw-sub  { font-size: 11px; letter-spacing: 3px; color: var(--stone-light); margin-top: -12px; }
  .pw-icon { font-size: 40px; }
  .pw-title { font-family: 'Noto Serif TC', serif; font-size: 16px; letter-spacing: 4px; color: white; }
  .pw-input {
    width: 100%; max-width: 280px;
    height: 52px; border-radius: 12px;
    border: 2px solid rgba(255,255,255,.2);
    background: rgba(255,255,255,.08);
    text-align: center;
    font-family: 'Noto Serif TC', serif;
    font-size: 28px; letter-spacing: 8px;
    color: white; outline: none;
    transition: border-color .2s;
  }
  .pw-input:focus { border-color: var(--gold-light); }
  .pw-input.error { border-color: var(--red); animation: shake .3s; }
  @keyframes shake {
    0%,100%{transform:translateX(0);}
    25%{transform:translateX(-8px);}
    75%{transform:translateX(8px);}
  }
  .pw-btn {
    width: 100%; max-width: 280px;
    padding: 14px; border-radius: 12px; border: none;
    background: var(--sage); color: white;
    font-family: 'Noto Serif TC', serif;
    font-size: 15px; letter-spacing: 4px;
